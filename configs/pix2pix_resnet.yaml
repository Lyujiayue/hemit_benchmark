# ============================================================================
# Pix2pix + ResNet Configuration
# Classic Conditional GAN Baseline (9 residual blocks)
# ============================================================================
# Based on: Isola et al., CVPR 2017
# Reference in HEMIT paper: pix2pix_ResNet

model:
  generator:
    arch: resnet        # resnet = 9 residual blocks
    input_nc: 1         # Grayscale H&E input
    output_nc: 3        # DAPI, panCK, CD3 channels
    ngf: 64

  discriminator:
    ndf: 64
    n_layers: 3
    patchgan: true

data:
  num_workers: 4
  patch_size: null
  use_augmentation: true

training:
  batch_size: 2
  num_epochs: 100
  val_freq: 5
  save_freq: 10
  lambda_L1: 100.0
  seed: 42

optimizer:
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999

scheduler:
  policy: step
  step_size: 50
  gamma: 0.5

exp_dir: experiments

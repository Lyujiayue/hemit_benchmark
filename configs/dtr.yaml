# ============================================================================
# DGR/DTR Configuration
# Misalignment-Resistant Virtual Staining
# ============================================================================
# Based on: Ma et al., arXiv:2509.14119
# Pretrained HEMIT weights:
#   https://github.com/birkhoffkiki/DTR/releases/download/weights/hemit_weight.pth
# Training: bash train_hemit.sh
# ============================================================================

model:
  generator:
    arch: dgr          # DGR misalignment-resistant architecture
    input_nc:  3
    output_nc: 3        # DAPI, panCK, CD3
    ngf: 64

  discriminator:
    ndf: 64
    n_layers: 3
    patchgan: true

data:
  num_workers: 4
  patch_size: null
  use_augmentation: true

training:
  batch_size: 2
  num_epochs: 100
  val_freq: 5
  save_freq: 10
  lambda_L1: 100.0
  lambda_fm: 1.0        # Feature matching loss
  seed: 42

optimizer:
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999

scheduler:
  policy: step
  step_size: 50
  gamma: 0.5

exp_dir: experiments

pretrained:
  hemit_url: "https://github.com/birkhoffkiki/DTR/releases/download/weights/hemit_weight.pth"
